<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Coding</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #764ba2;
        }
        #output {
            margin-top: 20px;
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Creative Coding</h1>
        <button onclick="greetUser()">Click Me!</button>
        <button onclick="generateColor()">Random Color</button>
        <div id="output"></div>
    </div>

    <script>
        function greetUser() {
            const name = prompt("What's your name?");
            if (name) {
                document.getElementById('output').textContent = `Hello, ${name}! Welcome to Creative Coding 🚀`;
            }
        }

        function generateColor() {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.background = `linear-gradient(135deg, ${randomColor} 0%, ${randomColor}99 100%)`;
            document.getElementById('output').textContent = `Color changed to: ${randomColor}`;
        }

        // Initialize
        document.getElementById('output').textContent = 'Click the buttons above!';
    <\/script>
</body>
</html>
